# x, y, z, roll, pitch, yaw (单位:度degrees)
# initialpose 表示 T_map_base: 机器人 base_link 在地图坐标系下的位姿
initialpose:  [0, 0, 0, 0, 0, 0]

kf_baselink2map:
  x: [0.001, 0.002]
  y: [0.001, 0.005]
  z: [0.00001, 0.04]

# ========== 多地图静默切换 ==========
# 单地图模式:不写 maps 字段,直接用 launch 的 path_map 即可,行为完全等价于改造前。
# 多地图模式:列出每张地图的 name 与 path,maps 出现即生效,会忽略 path_map。
# 每张地图拥有独立局部坐标系,frame_id 为 "map_<name>"。
# initialpose / next_initialpose 均表示 T_map_base: 机器人在该地图坐标系下的位姿,
# 运行时会自动转换为 T_map_odom = T_map_base * inv(T_odom_base)。
#
# maps:
#   - { name: lobby,    path: $(find open3d_loc)/../data/lobby.ply }
#   - { name: corridor, path: $(find open3d_loc)/../data/corridor.ply }
#
# map_switch:
#   enable: true               # 默认 false。即使有 maps,也需要显式打开切换
#   active_map: lobby          # 启动时激活的地图,默认取列表第一个
#   bbox_shrink: 1.0           # 米。AABB 内缩,避免边缘抖动反复触发
#   verify_fitness: 0.6        # 后台 ICP fitness > 该值算一次成功
#   verify_consecutive: 3      # 连续 N 次成功才执行切换
#   verify_period_ms: 500      # 后台验证周期 (≤2 Hz)
#   cooldown_ms: 5000          # 切换后/失败后冷却,期间不再尝试
